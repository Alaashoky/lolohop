# Disabled — no environment.yml in this project (pip-based, not conda).
# Re-enable if conda environment is added.
name: Python Package using Conda

on:
  workflow_dispatch:  # manual only

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for environment.yml
        run: |
          if [ ! -f environment.yml ]; then
            echo "No environment.yml found — skipping Conda build."
            exit 0
          fi
