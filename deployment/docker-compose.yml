version: '3.8'

services:
  hopefx-trading:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: hopefx-trading
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - HOPEFX_MASTER_KEY=${HOPEFX_MASTER_KEY}
      - HOPEFX_SALT=${HOPEFX_SALT}
      - DATABASE_URL=postgresql://hopefx:${DB_PASSWORD}@postgres:5432/hopefx
      - REDIS_URL=redis://redis:6379/0
      - OANDA_API_KEY=${OANDA_API_KEY}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID}
    ports:
      - "8000:8000"  # API
      - "8080:8080"  # Health
      - "8081:8081"  # Dashboard
    volumes:
      - hopefx-logs:/app/logs
      - hopefx-config:/app/config
    depends_on:
      - postgres
      - redis
    networks:
      - hopefx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: hopefx-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hopefx
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=hopefx
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - hopefx-network

  redis:
    image: redis:7-alpine
    container_name: hopefx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - hopefx-network

  grafana:
    image: grafana/grafana:latest
    container_name: hopefx-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - hopefx-network

  prometheus:
    image: prom/prometheus:latest
    container_name: hopefx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - hopefx-network

volumes:
  hopefx-logs:
  hopefx-config:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:

networks:
  hopefx-network:
    driver: bridge
