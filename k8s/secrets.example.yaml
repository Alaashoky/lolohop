apiVersion: v1
kind: Secret
metadata:
  name: hopefx-secrets
  namespace: hopefx-production
type: Opaque
stringData:
  # ENCRYPT THESE WITH SOPS OR SEALED SECRETS IN PRODUCTION
  DATABASE_URL: "postgresql+asyncpg://hopefx:CHANGEME@postgres:5432/hopefx"
  REDIS_URL: "redis://redis:6379/0"
  ENCRYPTION_KEY: "CHANGEME-32CHAR-HEX-KEY-HERE"
  JWT_SECRET: "CHANGEME-64CHAR-BASE64-SECRET"
  STRIPE_SECRET_KEY: "sk_test_CHANGEME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGEME"
  OANDA_API_KEY: "CHANGEME"
  OANDA_ACCOUNT_ID: "CHANGEME"
---
apiVersion: v1
kind: Secret
metadata:
  name: hopefx-tls
  namespace: hopefx-production
type: kubernetes.io/tls
data:
  tls.crt: BASE64_ENCODED_CERT
  tls.key: BASE64_ENCODED_KEY
